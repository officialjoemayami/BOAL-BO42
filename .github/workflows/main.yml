name: BO42 Interpreter CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build-test:

    runs-on: ubuntu-latest

    steps:
      # =========================
      # 1. Checkout code
      # =========================
      - name: Checkout repository
        uses: actions/checkout@v4

      # =========================
      # 2. Setup Python
      # =========================
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # =========================
      # 3. Upgrade pip
      # =========================
      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      # =========================
      # 4. Install build tools
      # =========================
      - name: Install build dependencies
        run: |
          pip install build twine setuptools wheel

      # =========================
      # 5. Install project (dev mode test)
      # =========================
      - name: Install BO42 package
        run: |
          pip install .

      # =========================
      # 6. Basic runtime validation
      # =========================
      - name: Import test
        run: |
          python -c "import bo42; import boal; print('BO42 IMPORT OK')"

      # =========================
      # 7. Build distribution
      # =========================
      - name: Build package
        run: python -m build

      # =========================
      # 8. Validate distribution
      # =========================
      - name: Check distribution
        run: twine check dist/*
