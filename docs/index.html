<style>
  body {
    font-family: 'Roboto', sans-serif;
    background: #f1f3f4;
    color: #202124;
  }

  /* SIDEBAR (Google Docs left nav feel) */
  .sidebar {
    height: 100vh;
    position: fixed;
    background: #ffffff;
    border-right: 1px solid #dadce0;
    width: 260px;
    padding-top: 20px;
  }

  .sidebar h5 {
    font-size: 14px;
    color: #5f6368;
    letter-spacing: .5px;
  }

  .sidebar a {
    display: block;
    padding: 10px 20px;
    color: #202124;
    text-decoration: none;
    font-size: 14px;
    border-radius: 6px;
    margin: 2px 10px;
  }

  .sidebar a:hover {
    background: #e8f0fe;
    color: #1a73e8;
  }

  /* MAIN CONTENT */
  .content {
    margin-left: 280px;
    padding: 40px;
    max-width: 900px;
  }

  /* SECTION CARD (Google Docs page feel) */
  .hero {
    background: #ffffff;
    padding: 40px;
    border-radius: 8px;
    box-shadow: 0 1px 3px rgba(60,64,67,.3), 0 4px 8px rgba(60,64,67,.15);
    margin-bottom: 30px;
  }

  /* HEADINGS */
  h1 {
    font-size: 32px;
    font-weight: 500;
    margin-bottom: 10px;
  }

  h2 {
    font-size: 24px;
    font-weight: 500;
    margin-top: 30px;
  }

  h5 {
    font-size: 16px;
    font-weight: 500;
    margin-top: 20px;
  }

  /* TEXT */
  p {
    font-size: 15px;
    line-height: 1.7;
    color: #3c4043;
  }

  li {
    font-size: 14px;
    margin-bottom: 6px;
  }

  /* CODE BLOCK (Google style) */
  pre {
    background: #202124;
    color: #e8eaed;
    padding: 16px;
    border-radius: 6px;
    font-size: 13px;
    overflow-x: auto;
  }

  code {
    background: #e8eaed;
    padding: 2px 6px;
    border-radius: 4px;
    font-size: 13px;
  }

  /* TAGS */
  .tag {
    display: inline-block;
    background: #e8f0fe;
    color: #1a73e8;
    padding: 4px 10px;
    border-radius: 16px;
    font-size: 12px;
    margin-right: 5px;
  }

  /* LINKS */
  a {
    color: #1a73e8;
  }

  a:hover {
    text-decoration: underline;
  }

  /* FOOTER */
  footer {
    font-size: 13px;
    color: #5f6368;
  }

  /* RESPONSIVE */
  @media (max-width: 768px) {
    .sidebar {
      display: none;
    }

    .content {
      margin-left: 0;
      padding: 20px;
    }
  }
</style>
